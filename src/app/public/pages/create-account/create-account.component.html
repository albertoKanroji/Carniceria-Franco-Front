<div class="login-container">
  <div class="login-background">
    <div class="background-overlay"></div>
  </div>

  <div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">
      <div class="col-lg-5 col-md-7 col-sm-9">
        <div class="login-card">
          <div class="login-header">
            <div class="brand-logo">
              <img src="../../../assets/img/logo.jpeg" alt="Carniceria Franco" class="logo-image">
            </div>
            <h2 class="login-title">Crear Cuenta</h2>
            <p class="login-subtitle">Registra tus datos para continuar</p>
          </div>

          <form (ngSubmit)="crearCuenta()" #createForm="ngForm" class="login-form">
            <div class="form-group">
              <label for="nombre" class="form-label">
                <i class="fas fa-user"></i>
                Nombre
              </label>
              <div class="input-wrapper">
                <input
                  type="text"
                  id="nombre"
                  name="nombre"
                  class="form-control-modern"
                  placeholder="Ingresa tu nombre"
                  [(ngModel)]="nombre"
                  required
                  autocomplete="given-name"
                />
                <div class="input-border"></div>
              </div>
            </div>

            <div class="form-group">
              <label for="apellido" class="form-label">
                <i class="fas fa-user-tag"></i>
                Apellido
              </label>
              <div class="input-wrapper">
                <input
                  type="text"
                  id="apellido"
                  name="apellido"
                  class="form-control-modern"
                  placeholder="Ingresa tu apellido"
                  [(ngModel)]="apellido"
                  required
                  autocomplete="family-name"
                />
                <div class="input-border"></div>
              </div>
            </div>

            <div class="form-group">
              <label for="correo" class="form-label">
                <i class="fas fa-envelope"></i>
                Correo Electronico
              </label>
              <div class="input-wrapper">
                <input
                  type="email"
                  id="correo"
                  name="correo"
                  class="form-control-modern"
                  placeholder="Ingresa tu correo"
                  [(ngModel)]="correo"
                  required
                  autocomplete="email"
                />
                <div class="input-border"></div>
              </div>
            </div>

            <div class="form-group">
              <label for="password" class="form-label">
                <i class="fas fa-lock"></i>
                Contrasena
              </label>
              <div class="input-wrapper">
                <input
                  type="password"
                  id="password"
                  name="password"
                  class="form-control-modern"
                  placeholder="Minimo 6 caracteres"
                  [(ngModel)]="password"
                  minlength="6"
                  required
                  autocomplete="new-password"
                />
                <div class="input-border"></div>
              </div>
            </div>

            <div class="form-group">
              <label for="confirmarPassword" class="form-label">
                <i class="fas fa-check-circle"></i>
                Confirmar Contrasena
              </label>
              <div class="input-wrapper">
                <input
                  type="password"
                  id="confirmarPassword"
                  name="confirmarPassword"
                  class="form-control-modern"
                  placeholder="Repite tu contrasena"
                  [(ngModel)]="confirmarPassword"
                  minlength="6"
                  required
                  autocomplete="new-password"
                />
                <div class="input-border"></div>
              </div>
            </div>

            <button type="submit" class="login-button" [disabled]="loading">
              <span *ngIf="loading" class="button-spinner">
                <i class="fas fa-circle-notch fa-spin"></i>
              </span>
              <span *ngIf="!loading" class="button-content">
                <i class="fas fa-user-plus me-2"></i>
                Crear Cuenta
              </span>
            </button>
          </form>

          <div class="login-footer">
            <p class="signup-text">
              Ya tienes cuenta?
              <a (click)="login()" class="signup-link">Iniciar sesion</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
